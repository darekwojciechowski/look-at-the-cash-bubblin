[pytest]
minversion = 8.0
addopts =
    --verbose
    --strict-markers
    --strict-config
    --cov=config
    --cov=data_processing
    --cov=main
    --cov-report=term-missing
    --cov-report=html
    --cov-report=json
    # Performance tests run explicitly (local/CI benchmark jobs), not in default suite.
    --ignore=tests/performance
    --maxfail=3
    --tb=short
    --color=yes
    -ra
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization (2026 standard)
markers =
    unit: Unit tests - fast, isolated, no external dependencies
    integration: Integration tests - verify component interaction via public behavior
    slow: Tests that take significant time to run (includes performance suites)
    security: Security-related tests
    performance: Performance and load testing (excluded from default run via --ignore=tests/performance)
    property: Property-based tests using hypothesis (health checks remain enabled)
    contract: Data contract tests validating inter-stage DataFrame schemas and ordering

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Coverage configuration
[coverage:run]
branch = true
parallel = true
source =
    config
    data_processing
    main
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
