name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"

jobs:
  # ============================================================================
  # STAGE 1: Code Quality Gates (fail-fast)
  # ============================================================================
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check code formatting with Ruff
        run: poetry run ruff format --check --diff .

      - name: Lint with Ruff
        run: poetry run ruff check .

      - name: Type checking with mypy
        run: poetry run mypy config data_processing main.py --ignore-missing-imports

  # ============================================================================
  # STAGE 2: Test Matrix (parallel execution)
  # ============================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        run: |
          poetry run pytest tests/ \
            -m "not integration and not slow and not security and not performance and not property" \
            --cov=config --cov=data_processing --cov=main \
            --cov-report= \
            --junitxml=test-results-unit.xml \
            -v

      - name: Prepare coverage data
        run: mv .coverage .coverage.unit 2>/dev/null || true

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-unit
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit
          path: test-results-unit.xml

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run integration tests
        run: |
          poetry run pytest tests/ \
            -m "integration" \
            --cov=config --cov=data_processing --cov=main \
            --cov-report= \
            --junitxml=test-results-integration.xml \
            -v

      - name: Prepare coverage data
        run: mv .coverage .coverage.integration 2>/dev/null || true

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-integration
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-integration
          path: test-results-integration.xml

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run security tests
        run: |
          poetry run pytest tests/ \
            -m "security" \
            --cov=config --cov=data_processing --cov=main \
            --cov-report= \
            --junitxml=test-results-security.xml \
            -v

      - name: Prepare coverage data
        run: mv .coverage .coverage.security 2>/dev/null || true

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-security
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-security
          path: test-results-security.xml

  test-property:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run property-based tests
        run: |
          poetry run pytest tests/ \
            -m "property" \
            --cov=config --cov=data_processing --cov=main \
            --cov-report= \
            --junitxml=test-results-property.xml \
            -v

      - name: Prepare coverage data
        run: mv .coverage .coverage.property 2>/dev/null || true

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-property
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-property
          path: test-results-property.xml

  test-performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run performance tests
        run: |
          poetry run pytest tests/ \
            -m "performance or slow" \
            --junitxml=test-results-performance.xml \
            --timeout=120 \
            --no-cov \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-performance
          path: test-results-performance.xml

  # ============================================================================
  # STAGE 3: Coverage Report and Summary
  # ============================================================================
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    # test-performance is listed in `needs` ONLY so the workflow graph groups it
    # into the same box as the other test jobs. Its result must not gate this job:
    # performance runs with --no-cov and uploads no coverage fragment, so a perf
    # failure must never block the coverage report or the coverage.json commit.
    needs: [test-unit, test-integration, test-security, test-property, test-performance]
    if: |
      always() &&
      needs.test-unit.result == 'success' &&
      needs.test-integration.result == 'success' &&
      needs.test-security.result == 'success' &&
      needs.test-property.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Need full history + write token to push the coverage commit back.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Download all coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: coverage-data/
          merge-multiple: true

      - name: Verify required coverage fragments exist
        run: |
          required_suffixes=(unit integration security property)
          missing=0

          for suffix in "${required_suffixes[@]}"; do
            fragment="coverage-data/.coverage.${suffix}"
            if [[ ! -f "${fragment}" ]]; then
              echo "Missing required coverage fragment: ${fragment}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Available coverage artifacts:"
            ls -la coverage-data || true
            exit 1
          fi

      - name: Combine coverage and generate reports
        run: |
          # Move all .coverage.* fragments into repo root so `coverage combine` picks them up.
          mv coverage-data/.coverage.* .
          poetry run coverage combine
          poetry run coverage json -o coverage.json
          poetry run coverage xml -o coverage.xml
          poetry run coverage html -d htmlcov

      - name: Enforce coverage threshold
        run: poetry run coverage report --fail-under=90

      - name: Display coverage summary
        run: |
          COVERAGE=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Coverage: ${COVERAGE}%**" >> $GITHUB_STEP_SUMMARY

      - name: Upload final coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-final
          path: |
            coverage.json
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Commit updated coverage.json to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- coverage.json; then
            echo "coverage.json unchanged — nothing to commit."
            exit 0
          fi
          git add coverage.json
          git commit -m "chore(ci): update coverage.json [skip ci]"
          # Rebase in case another commit landed while CI was running, then push.
          git pull --rebase origin main
          git push origin HEAD:main

  # ============================================================================
  # STAGE 4: CI Summary
  # ============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-security, test-property, test-performance]
    if: always()

    steps:
      - name: Generate CI Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint and Type Check | ${{ needs.lint.result == 'success' && 'PASSED' || 'FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result == 'success' && 'PASSED' || 'FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result == 'success' && 'PASSED' || 'FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.test-security.result == 'success' && 'PASSED' || 'FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Property Tests | ${{ needs.test-property.result == 'success' && 'PASSED' || 'FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.test-performance.result == 'success' && 'PASSED' || 'FAILED' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: |
          needs.lint.result == 'failure' ||
          needs.test-unit.result == 'failure' ||
          needs.test-integration.result == 'failure' ||
          needs.test-security.result == 'failure' ||
          needs.test-property.result == 'failure' ||
          needs.test-performance.result == 'failure'
        run: exit 1
